services:
  - type: web
    name: mealtap-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.deploy.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: mealtap_db
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.6
