# Netlify configuration for Mealtap Frontend

[build]
  base = "frontend"
  command = "yarn build"
  publish = "frontend/build"

[build.environment]
  NODE_VERSION = "20"

# SPA routing - redirect all routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
