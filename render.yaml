services:
  - type: web
    name: mealtap
    runtime: python
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: mealtap_db
      - key: CORS_ORIGINS
        value: "*"
      - key: NODE_VERSION
        value: "20"
      - key: PYTHON_VERSION
        value: "3.11.6"
